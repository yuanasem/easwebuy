<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - ECG System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .auth-container h2 { text-align: center; color: var(--primary); }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .toggle-link { text-align: center; cursor: pointer; color: #3498db; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2 id="auth-title">Login ECG Monitoring</h2>
        <div id="signup-fields" style="display:none;">
            <div class="form-group"><input type="text" id="username" placeholder="Username"></div>
        </div>
        <div class="form-group"><input type="email" id="email" placeholder="Email"></div>
        <div class="form-group"><input type="password" id="password" placeholder="Password"></div>
        
        <button class="btn-record" style="width:100%" id="auth-btn">Masuk</button>
        <p class="toggle-link" onclick="toggleAuth()">Belum punya akun? Sign Up</p>
    </div>

    <script>
        let isLogin = true;
        const apiBase = "URL_BACKEND_RAILWAY_ANDA/api"; // Nanti ganti dengan domain Railway

        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Login ECG" : "Sign Up ECG";
            document.getElementById('signup-fields').style.display = isLogin ? "none" : "block";
            document.getElementById('auth-btn').innerText = isLogin ? "Masuk" : "Daftar Akun";
        }

        document.getElementById('auth-btn').onclick = async () => {
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                username: document.getElementById('username').value
            };

            const endpoint = isLogin ? "/login" : "/signup";
            const res = await fetch(apiBase + endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await res.json();
            if (res.ok) {
                if (isLogin) {
                    localStorage.setItem('token', result.token);
                    window.location.href = "index.html"; // Masuk ke dashboard
                } else {
                    alert("Berhasil daftar! Silakan login.");
                    toggleAuth();
                }
            } else {
                alert(result.error);
            }
        };
    </script>
</body>
</html>
